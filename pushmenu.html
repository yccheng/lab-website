    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- HTML5 shim and Respond.js 讓 IE8 支援 HTML5 元素與媒體查詢 -->

  <style type="text/css">
    body{
  margin:0;
}
ul.ng,ul.ng ul{
    list-style-type: none;
    padding: 0;
    display: inline-block;
    margin: 0;
}

ul.ng > li {
  display:inline-block;  
}

ul.ng a{
  text-decoration: none;
}

ul.ng > li > a{
  color:white;
  display:block;/*下拉邊界貼齊*/
  padding:10px 20px;/*填滿li的a*/
}
ul.ng > li:hover{
  background-color:#1d87c5;
}
/***************第二層 ul************/
ul.ng ul{
  position: absolute;
  z-index:1;
  padding:0;
  background: #ffffff;
  display:none;
}

/*第二層 hover*/
ul.ng ul > li:hover{
  background: #eaeaea;
}

ul.ng > li:hover > ul{
  display:block;
}/*出現第2層*/


ul.ng ul > li > a{
  color:black;
  padding: 5px 10px;
  display: block;
  min-width:80px;
}


.nav_block{
  background-color: #3fb8ff;
  /*color: white;*/
  text-align:center;
    
}

.pushmenu h4{
  display:none;
  
}

ul.ng > li > span{
  position: absolute;
    right: 10%;
    background: white;
    width: 15px;
    height: 15px;
    border-radius: 10px;
    color: black;
    line-height: 15px;
    z-index:99;
    cursor:pointer;
    top: 8px;
      
}

ul.ng > li > span{
  
}

/*ul.ng > li > a::after{
    position: absolute;
    right: 10%;
    background: white;
    width: 15px;
    height: 15px;
    border-radius: 10px;
    color: black;
    line-height: 15px;
    content:"+";
    z-index:1;
  
}*/


/*992以上的解析度 span hidden*/
@media(min-width:992px){
  ul.ng > li > span{
    display:none;
  }
}

/*解析度大於991px icon hidden*/
#nav_icon{
 display:none; 
}

/*解析度991px 為收合式選單*/
@media(max-width:991px){
  /*nav icon*/
  #nav_icon{
    width:30px;
    height:25px;
    cursor:pointer; 
    float: left;
    position: relative;
    top: 7px;
    left: 7px;
    display:block;

  }
  #nav_icon span{
      display: block;
      position: absolute;
      height: 4px;
      width: 100%;
      background: #ffffff;
      border-radius: 9px;
      opacity: 1;
      left: 0
  }
  #nav_icon span:nth-child(1){
    top:0;
  }
  #nav_icon span:nth-child(2){
    top:10px;
  }
  #nav_icon span:nth-child(3){
    top:20px;
  }
  
  .pushmenu-push{
    overflow-x: hidden;
    position: relative;
    left: 0;
  }
  .pushmenu-push.push-iconbar{
    left:240px;
  }
  
  .pushmenu,
  .pushmenu-push{
    -webkit-transition: all 0.3s ease;
    -moz-transition: all 0.3s ease;
    transition: all 0.3s ease;
  }
  
  .pushmenu {
    background: #3c3933;
    font-family: Arial, Helvetics, sans-serif;
    width: 240px;
    height: 100%;
    top: 0;
    z-index: -1;/*for ie,Medge*/
    position: fixed;
    
    }
   .pushmenu.pushmenu-left{
     left:-240px;
     
   }
   .pushmenu.pushmenu-open{
     left:0;
   }
   .nav_block{
     height: 39px;
   }
    
    ul.ng > li{
      display:block;
      position:relative;
    }
    ul.ng ul{
    position: inherit;
    }
    .pushmenu h4{
      display:block;
      margin: 10px 0;
      color: white;
    }
    
    ul.ng > li:hover > ul{
     display:none;
    }
  
    .show{
      display:block!important;

    }

    ul.ng > li > a{
          position: relative;
    }
    ul.ng > li > a{
       display: initial;
       padding:0

    }
    ul.ng > li{
          /*padding: 10px 20px;*/
          line-height: 2;
    }
  
}








  </style>
  

    <body class="pushmenu-push">

  <div class="nav_block">

          <li><a title="" href="">About3</a></li>
          <li><a title="" href="">About4</a></li>

       </li>

       <li><a titile="" href="">Product</a></li>
       <li><a titile="" href="">Contact</a>
         <ul>
           <li><a title="" href="">Contact1</a></li>
         </ul>
        </li>
      </ul>   
    </nav>

    <div id="nav_icon">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

    

    <!-- jQuery (Bootstrap 所有外掛均需要使用) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <!-- 依需要參考已編譯外掛版本（如下），或各自獨立的外掛版本 -->
    <script src="js/bootstrap.min.js"></script>

    <script type="text/javascript">
      $(document).ready(function() {
    $menuLeft = $('.pushmenu-left');
    $nav_list = $('#nav_icon');
    
    $nav_list.click(function() {
      /*$(this).toggleClass('active');*/
      $('.pushmenu-push').toggleClass('push-iconbar');
      $menuLeft.toggleClass('pushmenu-open');
    });
    
    $('ul.ng > li > ul').before('<span>+</span>');//find ul and than appear html
    
    $btn='<span>+</span>';
    //$('ul.ng > li').apped($btn);
    
    $("ul.ng > li > span").click(function(){
      $(this).parent('li').toggleClass('show').children('ul').toggleClass('show');
      
      // $("ul.ng ul").slideToggle();
      $(this).text(function(i, v) {return v === '-' ? '+' : '-';});
      return false;
      
    });        
    
  });
  </script>
  </body>
</html>
